<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduCore SaaS - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-center items-center p-4 sm:p-8 relative overflow-hidden">
    
    <div class="absolute top-0 left-0 w-full h-72 sm:h-96 bg-blue-600 -skew-y-6 transform origin-top-left -z-10 shadow-lg"></div>

    <div class="w-full max-w-md w-full animate-in slide-in-from-top duration-700">
        <div class="text-center mb-6 sm:mb-8 sm:mt-[-80px] mt-[-40px]">
            <div class="bg-white p-3 rounded-2xl inline-block shadow-md mb-3 border border-blue-100">
                <i data-lucide="book-open" class="text-blue-600 w-8 h-8 sm:w-10 sm:h-10"></i>
            </div>
            <h1 class="text-2xl sm:text-3xl font-extrabold text-white tracking-tight drop-shadow-sm">EduCore SaaS</h1>
            <p class="text-blue-100 font-medium text-xs sm:text-sm mt-1">Smart School Management Platform</p>
        </div>

        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden mx-auto">
            <div class="p-6 sm:p-8">
                <h2 class="text-xl font-bold text-slate-800 text-center mb-6">Welcome Back</h2>
                
                <form id="loginForm" class="space-y-5">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wide mb-1.5 ml-1">Login ID / Username</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                <i data-lucide="user" class="h-4 w-4 text-slate-400"></i>
                            </div>
                            <input type="text" id="username" class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 focus:bg-white focus:border-blue-500 rounded-xl text-sm font-medium transition-all outline-none focus:ring-4 focus:ring-blue-50" placeholder="Enter your ID" required>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wide mb-1.5 ml-1">Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                <i data-lucide="lock" class="h-4 w-4 text-slate-400"></i>
                            </div>
                            <input type="password" id="password" class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 focus:bg-white focus:border-blue-500 rounded-xl text-sm font-medium transition-all outline-none focus:ring-4 focus:ring-blue-50" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-md shadow-blue-200 transition-all active:scale-[0.98] flex items-center justify-center gap-2 mt-2 text-sm sm:text-base">
                        Sign In Securely
                        <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>
                </form>
            </div>
            <div class="bg-slate-50 p-4 border-t border-slate-100 text-center">
                <p class="text-xs text-slate-500 font-medium">Use 'super' ID for Master Admin panel.</p>
            </div>
        </div>

        <div class="mt-8 flex items-center justify-center gap-1.5 text-slate-400">
            <i data-lucide="shield-check" class="w-3.5 h-3.5"></i>
            <p class="text-[10px] font-bold uppercase tracking-wider">End-to-End Encrypted Platform</p>
        </div>
    </div>

    <div id="toastContainer" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none w-full max-w-[90vw] sm:max-w-xs ml-4 sm:ml-0"></div>

    <script>
        lucide.createIcons();
        const API_BASE = 'https://school-attendance-vdbg.onrender.com/api';

        function showToast(message, type = 'error') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-emerald-50' : 'bg-red-50';
            const borderColor = type === 'success' ? 'border-emerald-200' : 'border-red-200';
            const textColor = type === 'success' ? 'text-emerald-800' : 'text-red-800';
            const icon = type === 'success' ? 'check-circle' : 'alert-circle';

            toast.className = `flex items-center gap-3 p-3.5 sm:p-4 rounded-xl border ${borderColor} ${bgColor} ${textColor} shadow-lg transform transition-all duration-300 translate-x-full pointer-events-auto`;
            toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5 shrink-0"></i><span class="font-medium text-xs sm:text-sm leading-tight">${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons();

            requestAnimationFrame(() => toast.classList.remove('translate-x-full'));
            setTimeout(() => {
                toast.classList.add('translate-x-full');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const originalBtnContent = submitBtn.innerHTML;

            submitBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Authenticating...';
            lucide.createIcons();
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });

                const data = await response.json();

                if (response.ok) {
                    showToast('Login successful! Redirecting...', 'success');
                    
                    localStorage.setItem('auth_token', data.auth_token);
                    localStorage.setItem('user_role', data.user_role || data.role);
                    localStorage.setItem('school_id', data.school_id || '0');
                    localStorage.setItem('user_name', data.name || data.login_id || usernameInput || '');
                    localStorage.setItem('teacher_id', data.id || '');
                    localStorage.setItem('class_teacher_of', data.class_teacher_of || '');
                    
                    const role = (data.user_role || data.role || '').toUpperCase();
                    setTimeout(() => {
                        if (role === 'SUPER') window.location.href = 'master_admin.html';
                        else if (role === 'MANAGEMENT' || role === 'ADMIN') window.location.href = 'management.html';
                        else if (role === 'TEACHER') window.location.href = 'teacher.html';
                        else {
                            showToast('Unknown user role', 'error');
                            submitBtn.innerHTML = originalBtnContent;
                            submitBtn.disabled = false;
                        }
                    }, 500);
                } else {
                    showToast(data.message || 'Invalid credentials');
                    submitBtn.innerHTML = originalBtnContent;
                    submitBtn.disabled = false;
                }
            } catch (error) {
                showToast('Network error, please try again later');
                submitBtn.innerHTML = originalBtnContent;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
