<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCore SaaS - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-center items-center p-4 relative overflow-hidden">
<!-- Background Decor -->
<div class="absolute top-0 left-0 w-full h-96 bg-blue-600 -skew-y-6 transform origin-top-left -z-10 shadow-lg"></div>

<div class="mb-8 text-center mt-[-100px]">
    <div class="bg-white p-3 rounded-2xl inline-block shadow-md mb-4 border border-blue-100">
        <i data-lucide="book-open" class="text-blue-600 w-10 h-10"></i>
    </div>
    <h1 class="text-3xl font-extrabold text-white tracking-tight">EduCore SaaS</h1>
    <p class="text-blue-100 mt-2 font-medium">Unified Management Portal</p>
</div>

<div class="w-full max-w-md bg-white rounded-xl shadow-2xl border-0 ring-1 ring-slate-900/5 overflow-hidden">
    <div class="p-6 border-b border-slate-100 mb-4 text-center">
        <h2 class="text-xl font-bold text-slate-900">Welcome Back</h2>
        <p class="text-sm text-slate-500 mt-1">Sign in to your account</p>
    </div>
    <div class="p-6 pt-0">
        <form id="loginForm" class="space-y-5">
            <div id="errorMsg" class="hidden p-3 bg-red-50 border border-red-100 text-red-600 text-sm rounded-lg items-start gap-2">
                <i data-lucide="shield" class="w-4 h-4 mt-0.5 shrink-0"></i>
                <p id="errorText">Invalid ID.</p>
            </div>
            
            <div class="space-y-2 relative">
                <label class="text-sm font-semibold text-slate-700 ml-1">Login ID</label>
                <div class="relative">
                    <i data-lucide="user" class="absolute left-3 top-2.5 h-5 w-5 text-slate-400"></i>
                    <input type="text" id="username" class="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm font-medium transition-all bg-slate-50 focus:bg-white" placeholder="admin_... or teacher_... or super" required>
                </div>
            </div>

            <div class="space-y-2 relative">
                <div class="flex justify-between items-center ml-1">
                    <label class="text-sm font-semibold text-slate-700">Password</label>
                    <a href="#" class="text-xs font-semibold text-blue-600 hover:text-blue-800">Forgot?</a>
                </div>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-3 top-2.5 h-5 w-5 text-slate-400"></i>
                    <input type="password" id="password" class="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm font-medium transition-all bg-slate-50 focus:bg-white" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-4 rounded-xl transition-all shadow-md hover:shadow-lg flex items-center justify-center gap-2 mt-2">
                Sign In
                <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
        </form>
    </div>
    <div class="px-6 py-4 bg-slate-50 border-t border-slate-100 text-center">
        <p class="text-xs text-slate-500">
            Student or Parent? <a href="student_view.html" class="font-semibold text-blue-600 hover:underline">Check Daily Homework here</a>
        </p>
    </div>
</div>

<div id="toastContainer" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <script>
        lucide.createIcons();
        const API_BASE = 'https://school-attendance-vdbg.onrender.com/api';

        function showToast(message, type = 'error') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-emerald-50' : 'bg-red-50';
            const borderColor = type === 'success' ? 'border-emerald-200' : 'border-red-200';
            const textColor = type === 'success' ? 'text-emerald-800' : 'text-red-800';
            const icon = type === 'success' ? 'check-circle' : 'alert-circle';
            
            toast.className = `flex items-center gap-2 p-4 rounded-xl border ${borderColor} ${bgColor} ${textColor} shadow-lg transform transition-all duration-300 translate-x-full`;
            toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5"></i><span class="font-medium text-sm">${message}</span>`;
            
            container.appendChild(toast);
            lucide.createIcons();
            
            // Animate in
            requestAnimationFrame(() => {
                toast.classList.remove('translate-x-full');
            });

            // Remove after 3s
            setTimeout(() => {
                toast.classList.add('translate-x-full');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value;
            const submitBtn = this.querySelector('button[type="submit"]');
            
            const originalBtnContent = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Authenticating...';
            submitBtn.disabled = true;
            lucide.createIcons();

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showToast('Login successful', 'success');
                    localStorage.setItem('auth_token', data.auth_token || data.token || 'mock_token');
                    localStorage.setItem('user_role', data.user_role || data.role);
                    localStorage.setItem('school_id', data.school_id || '');
                    
                    const role = (data.user_role || data.role || '').toUpperCase();
                    setTimeout(() => {
                        if (role === 'SUPER') {
                            window.location.href = 'master_admin.html';
                        } else if (role === 'MANAGEMENT' || role === 'ADMIN') {
                            window.location.href = 'management.html';
                        } else if (role === 'TEACHER') {
                            window.location.href = 'teacher.html';
                        } else {
                            showToast('Unknown user role', 'error');
                            submitBtn.innerHTML = originalBtnContent;
                            submitBtn.disabled = false;
                        }
                    }, 500);
                } else {
                    showToast(data.message || 'Invalid credentials');
                    submitBtn.innerHTML = originalBtnContent;
                    submitBtn.disabled = false;
                }
            } catch (error) {
                showToast('Network error, please try again later');
                submitBtn.innerHTML = originalBtnContent;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
