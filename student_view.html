<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Diary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 font-sans sm:py-8 sm:px-4 flex justify-center items-start min-h-screen">
    
    <div class="max-w-xl w-full bg-white sm:rounded-2xl shadow-xl border-slate-200 sm:border overflow-hidden min-h-screen sm:min-h-[80vh]">
        
        <div class="bg-slate-900 text-center py-6 px-4 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-8 opacity-5"><i data-lucide="book-open" class="w-32 h-32"></i></div>
            <h1 class="text-2xl font-black text-white relative z-10 tracking-tight">Vivekanand Vidhya Mandir, Bamani</h1>
            <p class="text-slate-400 text-sm font-medium relative z-10 mt-1 uppercase tracking-widest">Student Homework Portal</p>
        </div>

        <div class="bg-blue-600 px-6 py-4 flex items-center justify-between shadow-inner">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2 rounded-full backdrop-blur-sm"><i data-lucide="user" class="w-5 h-5 text-white"></i></div>
                <div>
                    <p class="text-blue-100 text-[10px] font-bold uppercase tracking-wider">Student Profile</p>
                    <p class="text-white font-bold text-lg leading-tight" id="studentName">Loading...</p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-blue-200 text-[10px] font-bold uppercase tracking-wider">Class</p>
                <p class="text-white font-bold" id="classLabel">...</p>
            </div>
        </div>

        <div class="p-4 sm:p-6 space-y-6">
            <div class="flex items-center justify-center gap-2 pb-6 border-b border-dashed border-slate-300">
                <i data-lucide="calendar" class="w-5 h-5 text-slate-400"></i>
                <h2 class="text-lg font-bold text-slate-800" id="currentDate"></h2>
            </div>

            <div>
                <div class="flex items-center gap-2 mb-4">
                    <i data-lucide="book-open" class="w-5 h-5 text-blue-600"></i>
                    <h3 class="font-bold text-slate-900 text-lg">Today's Homework</h3>
                </div>
                <div class="space-y-4" id="homeworkListContainer">
                     <div class="p-8 text-center"><i data-lucide="loader-2" class="w-6 h-6 animate-spin text-blue-600 mx-auto"></i></div>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none w-[90vw] md:w-auto max-w-sm"></div>

    <script>
        lucide.createIcons();
        const API_BASE = 'https://school-attendance-vdbg.onrender.com/api';

        function showToast(message, type = 'error') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-emerald-50' : 'bg-red-50';
            const borderColor = type === 'success' ? 'border-emerald-200' : 'border-red-200';
            const textColor = type === 'success' ? 'text-emerald-800' : 'text-red-800';
            const icon = type === 'success' ? 'check-circle' : 'alert-circle';
            
            toast.className = `flex items-center gap-2 p-4 rounded-xl border ${borderColor} ${bgColor} ${textColor} shadow-lg transform transition-all duration-300 translate-x-full pointer-events-auto`;
            toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5 inline-block align-middle shrink-0"></i><span class="font-medium text-sm leading-tight">${message}</span>`;
            
            container.appendChild(toast);
            lucide.createIcons();
            
            requestAnimationFrame(() => toast.classList.remove('translate-x-full'));
            setTimeout(() => {
                toast.classList.add('translate-x-full');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        async function fetchStudentDiary() {
            const params = new URLSearchParams(window.location.search);
            const studentId = params.get('id') || params.get('student_id');
            const hwId = params.get('hw_id');

            try {
                const res = await fetch(`${API_BASE}/student/diary?id=${encodeURIComponent(studentId || '')}&hw_id=${encodeURIComponent(hwId || '')}`);
                if (res.ok) {
                    const data = await res.json();

                    document.getElementById('studentName').innerText = data.student_name || "Guest Access";
                    document.getElementById('classLabel').innerText = data.class_name || "All Classes";
                    document.title = `Digital Diary - ${data.student_name || 'Diary'}`;

                    const homeworkList = data.homework_list || [];
                    const container = document.getElementById('homeworkListContainer');

                    if (homeworkList.length === 0) {
                        container.innerHTML = `
                            <div class="border border-slate-200 rounded-xl p-6 text-center text-slate-500 font-medium text-sm bg-slate-50">
                                No live homework is assigned for your class today!
                            </div>
                        `;
                        lucide.createIcons();
                        return;
                    }

                    let cardsHtml = '';
                    homeworkList.forEach((hw, index) => {
                        let detailsText = hw.details || '';
                        let subjectTitle = 'General Homework';
                        let lines = detailsText.split('\n').filter(l => l.trim() !== '');

                        // Smart Subject Extractor: Picks up the automatically appended subject from teacher.html
                        if (lines.length > 0) {
                            let firstLine = lines[0];
                            if (firstLine.includes(':')) {
                                let parts = firstLine.split(':');
                                if (parts[0].length < 30) { 
                                    subjectTitle = parts[0].trim();
                                    lines[0] = parts.slice(1).join(':').trim();
                                    if (lines[0] === '') lines.shift();
                                }
                            }
                        }

                        const linesHtml = lines.length > 0
                            ? lines.map(line => `<li class="pl-2 leading-relaxed">${line}</li>`).join('')
                            : `<li class="pl-2 leading-relaxed">No details provided.</li>`;

                        cardsHtml += `
                            <div class="border border-slate-200 rounded-xl overflow-hidden bg-white">
                                <div class="bg-slate-50 px-4 py-2 border-b border-slate-200 flex justify-between items-center">
                                    <h4 class="font-bold text-slate-800 text-sm">
                                        ${subjectTitle}
                                    </h4>
                                    <div class="flex items-center gap-2">
                                        ${hw.created_at ? `<span class="text-[10px] text-slate-400 font-medium">${hw.created_at}</span>` : ''}
                                    </div>
                                </div>
                                <div class="p-4 bg-white">
                                    <ul class="text-sm text-slate-700 space-y-2 pl-4 list-decimal marker:text-blue-500 marker:font-bold">
                                        ${linesHtml}
                                    </ul>
                                </div>
                            </div>
                        `;
                    });

                    container.innerHTML = cardsHtml;
                    lucide.createIcons();
                } else {
                    document.getElementById('homeworkListContainer').innerHTML = `
                        <div class="text-center text-red-500 font-semibold p-4">
                            No diary found matching the requested student or homework ID.
                        </div>
                    `;
                }
            } catch(e) {
                showToast('Failed to load student data');
                document.getElementById('homeworkListContainer').innerHTML = `
                    <div class="text-center text-slate-500 font-semibold p-4">
                        Network error loading homework feed.
                    </div>
                `;
            }
        }

        fetchStudentDiary();
    </script>
</body>
</html>
