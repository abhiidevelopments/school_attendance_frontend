<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCore - Teacher Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-100 font-sans sm:flex sm:justify-center">
    <!-- Mobile Container -->
    <div class="w-full sm:max-w-md bg-slate-100 min-h-screen relative flex flex-col sm:border-x border-slate-200 sm:shadow-2xl overflow-hidden">
        
        <header class="bg-blue-600 text-white p-4 pt-6 pb-6 rounded-b-3xl shadow-md sticky top-0 z-20 shrink-0">
            <div class="flex justify-between items-center mb-2">
                <div>
                    <p class="text-blue-200 text-xs font-semibold tracking-wider uppercase">Welcome Back</p>
                    <h1 class="text-xl font-bold">Mr. Smith</h1>
                </div>
                <div class="w-10 h-10 rounded-full border-2 border-white/20 bg-blue-800 flex items-center justify-center font-bold">JS</div>
            </div>
            <button onclick="logout()" class="text-[10px] text-blue-200 hover:text-white underline font-medium">Log out</button>
        </header>

        <main class="flex-1 p-4 pb-20 overflow-y-auto -mt-4 z-10 relative">
            
            <!-- TIMETABLE -->
            <div id="tab-timetable" class="tab-content active space-y-4">
                <div class="flex justify-between items-end mb-2 px-1">
                    <h2 class="text-lg font-bold text-slate-800">Today's Schedule</h2>
                </div>
                <!-- Card -->
                <div class="bg-white rounded-xl shadow-sm overflow-hidden flex border-0 ring-2 ring-blue-500">
                    <div class="flex flex-col items-center justify-center w-16 text-white font-bold p-3 bg-blue-600">
                        <span class="text-xs font-medium opacity-80 mb-0.5">Period</span><span class="text-xl">1</span>
                    </div>
                    <div class="flex-1 p-4 relative pr-12">
                        <span class="absolute top-3 right-3 bg-red-100 text-red-600 font-bold text-[10px] px-2 py-0.5 rounded flex items-center gap-1"><i data-lucide="sparkles" class="w-3 h-3"></i> NEW</span>
                        <h3 class="font-bold text-lg text-slate-900">Class 10A</h3>
                        <p class="text-sm text-slate-500">Math</p>
                        <button class="mt-3 text-xs bg-blue-50 text-blue-700 font-semibold px-3 py-1.5 rounded border border-blue-100 uppercase tracking-widest">Active Now</button>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow-sm overflow-hidden flex border-0">
                    <div class="flex flex-col items-center justify-center w-16 text-white font-bold p-3 bg-slate-700">
                        <span class="text-xs font-medium opacity-80 mb-0.5">Period</span><span class="text-xl">3</span>
                    </div>
                    <div class="flex-1 p-4">
                        <h3 class="font-bold text-lg text-slate-900">Class 11Sci</h3>
                        <p class="text-sm text-slate-500">Physics</p>
                    </div>
                </div>
                 <div class="bg-slate-200 rounded-xl overflow-hidden flex border-0 opacity-70">
                    <div class="flex flex-col items-center justify-center w-16 text-white font-bold p-3 bg-slate-400">
                        <span class="text-xs font-medium opacity-80 mb-0.5">Period</span><span class="text-xl">4</span>
                    </div>
                    <div class="flex-1 p-4">
                        <h3 class="font-bold text-lg text-slate-500 line-through">Class 9B</h3>
                        <p class="text-sm text-slate-500">Math (Done)</p>
                    </div>
                </div>
            </div>

            <!-- ATTENDANCE -->
            <div id="tab-attendance" class="tab-content space-y-4">
                <div class="bg-amber-50 border border-amber-200 rounded-xl p-3 flex gap-3 text-sm text-amber-800">
                    <i data-lucide="info" class="w-5 h-5 shrink-0 mt-0.5 text-amber-600"></i>
                    <p>Scanner data loaded. Toggle to mark attendance manually if scanner failed.</p>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="bg-slate-50 px-4 py-3 border-b border-slate-200 flex justify-between items-center text-sm">
                        <h3 class="font-bold text-slate-800">Class 10A • Math</h3>
                        <span id="attCount" class="text-xs px-2 py-1 bg-emerald-100 text-emerald-800 rounded font-semibold">2 Present</span>
                    </div>
                    <div class="divide-y divide-slate-100" id="studentList">
                        <!-- JS gen -->
                    </div>
                </div>
            </div>

            <!-- HOMEWORK -->
            <div id="tab-homework" class="tab-content space-y-4">
                <h2 class="text-lg font-bold text-slate-800 ml-1">Assign Homework</h2>
                <div class="bg-white rounded-xl shadow-sm p-4 space-y-4 border border-slate-200">
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-slate-500 uppercase">Target Class (From Schedule)</label>
                        <select class="w-full bg-slate-50 border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 font-medium"><option>10A (Math)</option><option>11Sci (Physics)</option></select>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-slate-500 uppercase">Homework Details (Pointwise)</label>
                        <textarea rows="6" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 resize-none font-medium leading-relaxed" placeholder="1. Complete Exercise 4.2&#10;2. Revise Chapter 3"></textarea>
                    </div>
                    <button id="publishHwBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md transition-all active:scale-[0.98]" onclick="publishHomework()">Publish to Student Portal</button>
                    <div id="hwLinkResult" class="hidden mt-4 p-3 bg-emerald-50 border border-emerald-200 rounded-lg text-sm text-emerald-800 break-all text-center font-medium"></div>
                </div>
            </div>

        </main>

        <!-- Bottom Nav -->
        <nav class="bg-white border-t border-slate-200 absolute bottom-0 w-full px-2 py-2 flex justify-between z-30 pb-safe shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <button onclick="nav('timetable', this)" class="nav-btn flex-1 flex flex-col items-center justify-center p-2 rounded-xl transition-all text-blue-600 bg-blue-50"><i data-lucide="calendar-days" class="w-6 h-6 mb-1"></i><span class="text-[10px] font-semibold">Schedule</span></button>
            <button onclick="nav('attendance', this)" class="nav-btn flex-1 flex flex-col items-center justify-center p-2 rounded-xl transition-all text-slate-400 hover:text-slate-600"><i data-lucide="check-square" class="w-6 h-6 mb-1"></i><span class="text-[10px] font-semibold">Attendance</span></button>
            <button onclick="nav('homework', this)" class="nav-btn flex-1 flex flex-col items-center justify-center p-2 rounded-xl transition-all text-slate-400 hover:text-slate-600"><i data-lucide="book-open" class="w-6 h-6 mb-1"></i><span class="text-[10px] font-semibold">Homework</span></button>
        </nav>
    </div>
    
    <div id="toastContainer" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none w-[90vw] md:w-auto max-w-sm"></div>

    <script>
        lucide.createIcons();
        const API_BASE = 'https://school-attendance-vdbg.onrender.com/api';
        
        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        function showToast(message, type = 'error') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-emerald-50' : 'bg-red-50';
            const borderColor = type === 'success' ? 'border-emerald-200' : 'border-red-200';
            const textColor = type === 'success' ? 'text-emerald-800' : 'text-red-800';
            const icon = type === 'success' ? 'check-circle' : 'alert-circle';
            
            toast.className = `flex items-center gap-2 p-4 rounded-xl border ${borderColor} ${bgColor} ${textColor} shadow-lg transform transition-all duration-300 translate-x-full pointer-events-auto`;
            toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5 inline-block align-middle shrink-0"></i><span class="font-medium text-sm leading-tight">${message}</span>`;
            
            container.appendChild(toast);
            lucide.createIcons();
            
            requestAnimationFrame(() => toast.classList.remove('translate-x-full'));
            setTimeout(() => {
                toast.classList.add('translate-x-full');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function nav(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('text-blue-600', 'bg-blue-50');
                b.classList.add('text-slate-400');
            });
            btn.classList.add('text-blue-600', 'bg-blue-50');
            btn.classList.remove('text-slate-400');

            if(tabId === 'attendance') fetchRoster();
        }

        // Attendance Logic
        let students = [];
        
        async function fetchRoster() {
            document.getElementById('studentList').innerHTML = `<div class="p-8 flex justify-center"><i data-lucide="loader-2" class="w-6 h-6 animate-spin text-blue-600"></i></div>`;
            lucide.createIcons();
            
            try {
                const token = localStorage.getItem('auth_token');
                if(!token) return;

                // Simulate API Call for roster
                // const res = await fetch(`${API_BASE}/teacher/roster`, { headers: { 'Authorization': 'Bearer ' + token }});
                setTimeout(() => {
                    students = [
                        {id: 101, name: 'Alex Carter', p: true},
                        {id: 102, name: 'Bethany Woods', p: false},
                        {id: 103, name: 'Charlie Davis', p: true}
                    ];
                    renderStudents();
                }, 400);
            } catch(e) {
                showToast('Failed to fetch roster');
            }
        }

        function renderStudents() {
            let html = '';
            let pCount = 0;
            students.forEach(s => {
                if(s.p) pCount++;
                html += `
                <div class="p-4 flex items-center justify-between">
                    <div>
                        <p class="font-semibold text-slate-900">${s.name}</p>
                        <p class="text-xs text-slate-400 font-mono mt-0.5">ID: ${s.id}</p>
                    </div>
                    <button onclick="toggleAtt(${s.id})" class="relative inline-flex h-7 w-12 shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none ${s.p ? 'bg-emerald-500':'bg-red-400'}">
                        <span class="pointer-events-none inline-block h-6 w-6 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out ${s.p ? 'translate-x-5':'translate-x-0'}"></span>
                    </button>
                </div>`;
            });
            document.getElementById('studentList').innerHTML = html;
            document.getElementById('attCount').innerText = `${pCount} / ${students.length} Present`;
        }

        async function toggleAtt(id) {
            let s = students.find(x => x.id === id);
            const originalState = s.p;
            s.p = !s.p;
            renderStudents();

            try {
                const token = localStorage.getItem('auth_token');
                // Simulate sync
                /*
                await fetch(`${API_BASE}/attendance/manual`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ student_id: id, status: s.p ? 'present' : 'absent' })
                });
                */
            } catch(e) {
                showToast('Failed to sync. Reverting.', 'error');
                s.p = originalState; // revert locally
                renderStudents();
            }
        }

        // Homework Logic
        async function publishHomework() {
            const cls = document.querySelector('select').value;
            const details = document.querySelector('textarea').value.trim();
            const btn = document.getElementById('publishHwBtn');
            const linkDiv = document.getElementById('hwLinkResult');

            if(!cls || !details) {
                showToast('Please enter homework details');
                return;
            }

            btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin mx-auto"></i>';
            btn.disabled = true;
            lucide.createIcons();

            try {
                const token = localStorage.getItem('auth_token');
                /*
                const res = await fetch(`${API_BASE}/homework`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ class_name: cls, details: details })
                });
                const data = await res.json();
                const hwId = data.id || 'hw_mock_987';
                */
                setTimeout(() => {
                    const hwId = 'hw_' + Date.now();
                    showToast('Homework Published Successfully', 'success');
                    linkDiv.innerHTML = `Public Link:<br><a href="student_view.html?hw_id=${hwId}" class="underline tracking-wide break-all" target="_blank">student_view.html?hw_id=${hwId}</a>`;
                    linkDiv.classList.remove('hidden');
                    
                    btn.innerHTML = 'Publish to Student Portal';
                    btn.disabled = false;
                    document.querySelector('textarea').value = '';
                }, 800);
            } catch(e) {
                showToast('Failed to publish homework');
                btn.innerHTML = 'Publish to Student Portal';
                btn.disabled = false;
            }
        }

        // Initialize fetch if attendance is default active tab
        if(document.getElementById('tab-attendance').classList.contains('active')) {
            fetchRoster();
        }
    </script>
</body>
</html>
